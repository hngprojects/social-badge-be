name: CD

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main, staging]
    types:
      - completed

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment: ${{ github.event.workflow_run.head_branch == 'main' && 'production' || 'staging' }}

    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            export PATH="$HOME/.local/bin:$HOME/.local/share/pnpm:$PATH"
            source $HOME/.local/bin/env 2>/dev/null || true
            cd ~/social-badge-be
            git pull origin ${{ github.event.workflow_run.head_branch }}
            uv sync
            uv run alembic upgrade head
            pm2 restart social-badge-be
